<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    {% seo %}
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" 
          integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
  </head>
  <body>
    <div class="wrapper">
      <header>
        <div class="profile-container">

          <h1><a href="{{ "/" | relative_url }}">{{ site.title | default: site.github.repository_name }}</a></h1>
  
          {% if site.logo %}
            <img src="{{ site.logo | relative_url }}" alt="Logo" class="profile-img" />
          {% endif %}
  
          <p>{{ site.description | default: site.github.project_tagline }}</p>

        </div>
          
        <nav>
          <ul>
            {% include nav_item.html links=site.nav %}
          </ul>
        </nav>

        <div class="social-icons">
          <a href="https://github.com/j-ochmann"><i class="fa-brands fa-github"></i></a>
          <a href="https://www.linkedin.com/in/jind%C5%99ich-ochmann-5186967b"><i class="fa-brands fa-linkedin"></i></a>
          <a href="https://www.instagram.com/jindrichochmann"><i class="fa-brands fa-instagram"></i></a>
          <a href="https://www.youtube.com/@JindrichOchmann"><i class="fa-brands fa-youtube"></i></a>
          <a href="https://www.facebook.com/jindrich.ochmann"><i class="fa-brands fa-facebook"></i></a>
        </div>
      </header>
      <section>
        {{ content }}
      </section>
    </div>
  </body>
</html>
