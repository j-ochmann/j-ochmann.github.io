<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="/assets/css/style.scss">
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <img src="/assets/img/IMG_20250712_063930.jpg" class="profile" alt="Jindřich Ochmann">
    <nav>
      <ul>
        {% include nav_item.html links=site.nav %}
      </ul>
    </nav>

    <div class="social-icons">
      <a href="www.instagram.com" target="_blank" title="Instagram">
        <i class="fab fa-instagram"></i>
      </a>
      <a href="www.linkedin.com" target="_blank" title="LinkedIn">
        <i class="fab fa-linkedin"></i>
      </a>
      <a href="www.facebook.com" target="_blank" title="Facebook">
        <i class="fab fa-facebook"></i>
      </a>
    </div>
    
  </aside>

  <main class="content">
    {{ content }}
  </main>

</div>

</body>
</html>
