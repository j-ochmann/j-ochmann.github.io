<!DOCTYPE html>
<html lang="{{ site.lang | default: "cs-CZ" }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" 
          integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="fonts.googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <!-- Hamburger pro mobil -->
    <div class="mobile-top-bar">
      <button id="mobile-menu-toggle" aria-label="Menu">
        <i class="fa-solid fa-bars"></i>
      </button>
      <span class="mobile-title">{{ site.title }}</span>
    </div>

    <div class="layout">
      <aside id="sidebar">
        <div class="profile-container">
          <h1 class="profile-name">
            <a href="{{ "/about" | relative_url }}">{{ site.title | default: site.github.repository_name }}</a>
          </h1>
          <p class="profile-description">{{ site.description | default: site.github.project_tagline }}</p>
          {% if site.logo %}
            <img src="{{ site.logo | relative_url }}" alt="Logo" class="profile-img" />
          {% endif %}
          <div class="social-icons-arc">
            <a href="https://github.com/j-ochmann" class="icon-gh"><i class="fa-brands fa-github"></i></a>
            <a href="https://www.linkedin.com/in/jind%C5%99ich-ochmann-5186967b" class="icon-li"><i class="fa-brands fa-linkedin"></i></a>
            <a href="https://www.instagram.com/jindrichochmann" class="icon-ig"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.facebook.com/jindrich.ochmann" class="icon-fb"><i class="fa-brands fa-facebook"></i></a>
            <a href="https://www.youtube.com/@JindrichOchmann" class="icon-yt"><i class="fa-brands fa-youtube"></i></a>
          </div>        
        </div>
        
        <nav class="nav-links">
          <ul>
            {% include nav_item.html links=site.nav %}
          </ul>
        </nav>
      </aside>
  
      <main class="content">
        {{ content }}
      </main>
    </div>

    <script>
      const toggle = document.getElementById('mobile-menu-toggle');
      const sidebar = document.getElementById('sidebar');
      
      toggle.addEventListener('click', () => {
        sidebar.classList.toggle('active');
        toggle.querySelector('i').classList.toggle('fa-bars');
        toggle.querySelector('i').classList.toggle('fa-xmark');
      });
    </script>
  </body>
</html>
