<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    {% seo %}
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" 
          integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="fonts.googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <div class="wrapper">
      <!-- TOP BAR – pouze mobil -->
      <div class="mobile-top-bar">
        <button id="mobile-menu-toggle">
          <i class="fa-solid fa-bars"></i>
        </button>
        <span class="mobile-title">{{ site.title }}</span>
      </div>
    
      <aside id="sidebar">
        <div class="profile-container">
          <h1 class="profile-name">
            <a href="{{ "/about" | relative_url }}">{{ site.title }}</a>
          </h1>
    
          <p class="profile-description">{{ site.description }}</p>
    
          {% if site.logo %}
            <img src="{{ site.logo | relative_url }}" class="profile-img">
          {% endif %}
    
          <div class="social-icons-arc">
            …
          </div>
        </div>
    
        <nav class="nav-links">
          <ul>
            {% include nav_item.html links=site.nav %}
          </ul>
        </nav>
      </aside>
    
      <main class="content">
        {{ content }}
      </main>
    
    </div>
  
    <script>
      const toggle = document.getElementById('mobile-menu-toggle');
      const sidebar = document.getElementById('sidebar');
    
      toggle.onclick = () => {
        sidebar.classList.toggle('active');
        toggle.querySelector('i').classList.toggle('fa-xmark');
        toggle.querySelector('i').classList.toggle('fa-bars');
      };
    </script>
  </body>
</html>
