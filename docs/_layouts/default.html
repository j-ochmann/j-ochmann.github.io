<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    {% seo %}
    <link rel="stylesheet" href="cdnjs.cloudflare.com">
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
  </head>
  <body>
    <div class="wrapper">
      <header>
        <div class="profile-container">

          <h1><a href="{{ "/" | relative_url }}">{{ site.title | default: site.github.repository_name }}</a></h1>
  
          {% if site.logo %}
            <img src="{{ site.logo | relative_url }}" alt="Logo" class="profile" />
          {% endif %}
  
          <p>{{ site.description | default: site.github.project_tagline }}</p>

        </div>
          
        <nav>
          <ul>
            {% include nav_item.html links=site.nav %}
          </ul>
        </nav>

        <div class="social-icons">
          <a href="https://github.com"><i class="fa-brands fa-github"></i></a>
          <a href="https://linkedin.com"><i class="fa-brands fa-linkedin"></i></a>
        </div>
      </header>
      <section>
        {{ content }}
      </section>
    </div>
  </body>
</html>
